capture:
  required_poses: ["center", "yaw_left", "yaw_right", "pitch_up", "pitch_down"]
  burst_size: 1
  max_capture_seconds: 12.0
  pose_tolerance_deg: 20.0
  min_detection_confidence: 0.50

quality:
  min_sharpness: 20.0
  min_exposure: 20.0
  max_exposure: 235.0
  max_occlusion_ratio: 0.60
  max_motion_blur: 400.0

aggregation:
  min_frames_total: 5
  max_outlier_cosine_distance: 0.50
  max_intra_session_variance: 0.08

temporal_liveness:
  min_optical_flow_score: 0.02
  min_flow_consistency_score: 0.08
  min_blink_count: 1
  min_micro_motion_score: 0.01
  min_parallax_score: 0.01
  use_rppg: false

active_liveness:
  enabled: true
  prompts: ["BLINK_TWICE", "TURN_HEAD"]
  response_timeout_s: 4.0
  deterministic_prompt_seed: 2026
  blink_required_count: 1
  turn_min_delta_deg: 9.0

liveness_fusion:
  min_overall_confidence: 0.35
  passive_temporal_min_confidence: 0.18
  active_required: true
  calibration_method: "platt"
  platt_a: 6.0
  platt_b: -2.2
